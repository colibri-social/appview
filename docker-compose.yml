services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://colibri:${POSTGRES_PASSWORD}@postgres:5432/colibri
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8000
      RUST_LOG: ${RUST_LOG:-colibri_appview=info,rocket=info}
      # JETSTREAM_URL: wss://jetstream2.us-east.bsky.network/subscribe
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: colibri
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: colibri
    volumes:
      - postgres:/var/lib/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colibri -d colibri"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  postgres:
    driver: local

networks:
  internal:
    driver: bridge
