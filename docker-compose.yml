services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      K256_PRIVATE_KEY: ${K256_PRIVATE_KEY}
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8000
      RUST_LOG: ${RUST_LOG:-colibri_appview=info,rocket=info}
      JETSTREAM_URL: ${JETSTREAM_URL:-}
      TAP_HOSTNAME: ${TAP_HOSTNAME}
      TAP_ADMIN_PASSWORD: ${TAP_ADMIN_PASSWORD}
      APPVIEW_DOMAIN: ${APPVIEW_DOMAIN}
      INVITE_API_KEY: ${INVITE_API_KEY}
      PDS_LOC: ${PDS_LOC}
      PDS_ADMIN_PASS: ${PDS_ADMIN_PASS}
      APPVIEW_HANDLE_DOMAIN: ${APPVIEW_HANDLE_DOMAIN}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      tap:
        condition: service_started
    networks:
      - internal
      - dokploy-network

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colibri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colibri}
    volumes:
      - postgres:/var/lib/postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-colibri} -d ${POSTGRES_DB:-colibri}",
        ]
      interval: 2s
      timeout: 2s
      retries: 10
    networks:
      - internal

  tap:
    image: ghcr.io/bluesky-social/indigo/tap:latest
    restart: unless-stopped
    environment:
      TAP_ADMIN_PASSWORD: ${TAP_ADMIN_PASSWORD}
      TAP_DATABASE_URL: ${DATABASE_URL}
      TAP_SIGNAL_COLLECTION: social.colibri.actor.data
      TAP_COLLECTION_FILTERS: social.colibri.*,app.bsky.actor.profile
      TAP_RELAY_URL: https://relay1.eurosky.network
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - tap:/data

volumes:
  postgres:
    driver: local
  tap:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
