services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INVITE_API_KEY: ${INVITE_API_KEY}
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8000
      RUST_LOG: ${RUST_LOG:-colibri_appview=info,rocket=info}
      JETSTREAM_URL: ${JETSTREAM_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      tap:
        condition: service_healthy
    networks:
      - internal
      - dokploy-network

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colibri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colibri}
    volumes:
      - postgres:/var/lib/postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-colibri} -d ${POSTGRES_DB:-colibri}",
        ]
      interval: 2s
      timeout: 2s
      retries: 10
    networks:
      - internal

  tap:
    image: ghcr.io/bluesky-social/indigo/tap:latest
    restart: unless-stopped
    environment:
      TAP_ADMIN_PASSWORD: ${TAP_ADMIN_PASSWORD}
      TAP_DATABASE_URL: ${DATABASE_URL}
      TAP_COLLECTION_FILTERS: social.colibri.*
    ports:
      - "2480:2480"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres:
    driver: local

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
