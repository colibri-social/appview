name: Rust CI

on:
  workflow_dispatch:
  # Only run on pushes to main (i.e. after a PR merges). Branch pushes that
  # belong to an open PR are covered by the pull_request trigger below; running
  # push on "**" as well made every PR push start two identical CI runs.
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96
        run: rustup toolchain install 1.96 --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96
        run: rustup toolchain install 1.96 --profile minimal --component clippy
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Run linter
        run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96
        run: rustup toolchain install 1.96 --profile minimal
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features
