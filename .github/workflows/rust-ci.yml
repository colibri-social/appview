name: Rust CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.93
        run: rustup toolchain install 1.93 --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.93
        run: rustup toolchain install 1.93 --profile minimal --component clippy
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Run linter
        run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.93
        run: rustup toolchain install 1.93 --profile minimal
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features

  # Cut a semver pre-release from feat/rewrite once the checks above pass.
  # Runs only on branch pushes (not PRs). Pushes a v{version}-rc.<n> tag with a
  # GitHub App token so the tag actually triggers the Release workflow (tags
  # pushed by the default GITHUB_TOKEN do not trigger other workflows), then
  # opens a GitHub pre-release. .github/workflows/release.yml (tag: v*) builds
  # the image + binaries and attaches them. Uses the same RELEASE_APP_ID /
  # RELEASE_APP_PRIVATE_KEY App as release-plz. Remove this job once
  # feat/rewrite merges to main.
  preview:
    name: Preview release
    needs: [format, lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/rewrite'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Compute rc version
        id: ver
        run: |
          BASE=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          echo "tag=v${BASE}-rc.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Push tag
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
      - name: Open GitHub pre-release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --prerelease \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes
