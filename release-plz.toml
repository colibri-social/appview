[workspace]
# colibri-appview is an application, not a library, never publish to crates.io.
publish = false
# publish = false still leaves release-plz checking crates.io for the last
# release, so it can't find a baseline to bump from and never proposes a new
# version. git_only makes it read the current version from the v{{version}} git
# tags instead, so conventional commits since the last tag drive the bump.
git_only = true
# Clean tags (v0.1.0), not the workspace default colibri-appview-v0.1.0.
git_tag_name = "v{{ version }}"
# release-plz only creates + pushes the tag. .github/workflows/release.yml then
# builds the image + binaries and publishes the GitHub Release afterwards, so a
# release never appears before its artifacts are live.
git_release_enable = false
# colibri-appview is a binary-only app with no public library API, and it depends
# on the local-only `migration` crate. cargo-semver-checks only works on library
# crates and, to build the baseline, runs a full `cargo package` that resolves
# `migration` from crates.io (where an unrelated crate of that name exists) and
# fails. It's useless here, so turn it off; release-plz still diffs via
# `cargo package --list`, which resolves path deps locally.
semver_check = false

[[package]]
name = "migration"
# Internal SeaORM migration crate. Don't version, tag, or release it.
release = false
