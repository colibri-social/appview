services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: colibri
      POSTGRES_DB: colibri
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql

volumes:
  postgres:
    driver: local
